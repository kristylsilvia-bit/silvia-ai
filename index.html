<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Silvia AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
/* ============================================================
   SILVIA AI — design tokens
   ============================================================ */
:root {
  /* brand gradient stops */
  --grad-violet: #7C5CFF;
  --grad-indigo: #5B5BFF;
  --grad-teal:   #2DD4BF;
  --grad-coral:  #FF6B6B;
  --grad-pink:   #F472B6;
  --grad-amber:  #FBBF24;

  --brand-gradient: linear-gradient(135deg, #7C5CFF 0%, #5B8DEF 45%, #2DD4BF 100%);
  --brand-gradient-warm: linear-gradient(135deg, #FF6B6B 0%, #F472B6 50%, #7C5CFF 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(124,92,255,.18), rgba(45,212,191,.14));

  --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
  --r-pill: 999px;

  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px; --s-12: 48px;

  --ease-out: cubic-bezier(.22, 1, .36, 1);
  --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
  --dur-fast: 130ms;
  --dur-base: 240ms;
  --dur-slow: 420ms;

  --sidebar-w: 288px;
}

/* ---------- DARK (default) ---------- */
[data-theme="dark"] {
  --bg-app: #0A0B12;
  --bg-sunken: #07080E;
  --bg-panel: rgba(20, 22, 34, 0.72);
  --bg-panel-solid: #12141F;
  --bg-elevated: rgba(30, 33, 48, 0.66);
  --bg-bubble-ai: rgba(28, 31, 46, 0.55);
  --bg-bubble-user: linear-gradient(135deg, rgba(124,92,255,.22), rgba(91,141,239,.16));
  --bg-input: rgba(18, 20, 31, 0.7);
  --bg-hover: rgba(255,255,255,0.05);
  --bg-active: rgba(124,92,255,0.14);

  --fg1: #F4F5FB;
  --fg2: #AEB2C7;
  --fg3: #6F7390;
  --fg-faint: #4A4E68;

  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);
  --border-glow: rgba(124,92,255,0.35);

  --shadow-1: 0 1px 2px rgba(0,0,0,.4);
  --shadow-2: 0 8px 24px rgba(0,0,0,.45);
  --shadow-3: 0 24px 64px rgba(0,0,0,.55);
  --glass-blur: 22px;

  --code-bg: rgba(8, 9, 15, 0.9);
  --scroll-thumb: rgba(255,255,255,0.13);
  --scroll-thumb-hover: rgba(255,255,255,0.24);
  --aurora-opacity: 0.55;
}

/* ---------- LIGHT ---------- */
[data-theme="light"] {
  --bg-app: #F4F5FA;
  --bg-sunken: #ECEDF4;
  --bg-panel: rgba(255, 255, 255, 0.78);
  --bg-panel-solid: #FFFFFF;
  --bg-elevated: rgba(255, 255, 255, 0.8);
  --bg-bubble-ai: rgba(255, 255, 255, 0.78);
  --bg-bubble-user: linear-gradient(135deg, rgba(124,92,255,.16), rgba(91,141,239,.12));
  --bg-input: rgba(255, 255, 255, 0.85);
  --bg-hover: rgba(15,18,40,0.04);
  --bg-active: rgba(124,92,255,0.10);

  --fg1: #14172A;
  --fg2: #4C516C;
  --fg3: #80859E;
  --fg-faint: #AEB2C7;

  --border: rgba(15,18,40,0.08);
  --border-strong: rgba(15,18,40,0.14);
  --border-glow: rgba(124,92,255,0.4);

  --shadow-1: 0 1px 2px rgba(20,23,42,.06);
  --shadow-2: 0 10px 30px rgba(20,23,42,.10);
  --shadow-3: 0 28px 64px rgba(20,23,42,.16);
  --glass-blur: 20px;

  --code-bg: #14172A;
  --scroll-thumb: rgba(15,18,40,0.16);
  --scroll-thumb-hover: rgba(15,18,40,0.30);
  --aurora-opacity: 0.4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--bg-app);
  color: var(--fg1);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  line-height: 1.55;
}

/* ambient aurora background */
.aurora {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden; opacity: var(--aurora-opacity);
  transition: opacity var(--dur-slow);
}
.aurora::before, .aurora::after {
  content: ''; position: absolute; border-radius: 50%;
  filter: blur(90px);
}
.aurora::before {
  width: 50vw; height: 50vw; left: -10vw; top: -15vw;
  background: radial-gradient(circle, rgba(124,92,255,.5), transparent 70%);
  animation: drift1 22s ease-in-out infinite alternate;
}
.aurora::after {
  width: 46vw; height: 46vw; right: -12vw; bottom: -18vw;
  background: radial-gradient(circle, rgba(45,212,191,.42), transparent 70%);
  animation: drift2 26s ease-in-out infinite alternate;
}
.aurora .blob3 {
  content: ''; position: absolute; width: 38vw; height: 38vw;
  right: 18vw; top: 8vw; border-radius: 50%; filter: blur(100px);
  background: radial-gradient(circle, rgba(255,107,107,.30), transparent 70%);
  animation: drift3 30s ease-in-out infinite alternate;
}
@keyframes drift1 { to { transform: translate(8vw, 10vh) scale(1.15); } }
@keyframes drift2 { to { transform: translate(-7vw, -8vh) scale(1.2); } }
@keyframes drift3 { to { transform: translate(-10vw, 6vh) scale(0.85); } }
@media (prefers-reduced-motion: reduce) {
  .aurora::before, .aurora::after, .aurora .blob3 { animation: none; }
}

/* custom scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) transparent; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--scroll-thumb); border-radius: 999px;
  border: 3px solid transparent; background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); background-clip: padding-box; border: 3px solid transparent; }

/* ===== SECTION:LAYOUT ===== */
.app {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100dvh;
  transition: grid-template-columns var(--dur-base) var(--ease-out);
}
.app.sidebar-collapsed { grid-template-columns: 0px 1fr; }

/* ---------- SIDEBAR ---------- */
.sidebar {
  position: relative; z-index: 30;
  display: flex; flex-direction: column;
  background: var(--bg-panel);
  backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  border-right: 1px solid var(--border);
  overflow: hidden;
  min-width: 0;
}
.sidebar-inner {
  width: var(--sidebar-w); height: 100%;
  display: flex; flex-direction: column;
  padding: var(--s-4) var(--s-3);
  gap: var(--s-3);
}
.brand {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-2) var(--s-2) var(--s-3);
}
.brand-logo {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--brand-gradient);
  display: grid; place-items: center; flex-shrink: 0;
  box-shadow: 0 6px 18px rgba(124,92,255,.45);
  position: relative; overflow: hidden;
}
.brand-logo svg { width: 22px; height: 22px; }
.brand-name { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
.brand-name .tag {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: .04em;
  color: var(--fg3); text-transform: uppercase;
}

.new-chat-btn {
  display: flex; align-items: center; justify-content: center; gap: var(--s-2);
  width: 100%; padding: 13px var(--s-4);
  font-family: var(--font-ui); font-size: 14.5px; font-weight: 700; color: #fff;
  background: var(--brand-gradient); background-size: 160% 160%;
  border: none; border-radius: var(--r-md); cursor: pointer;
  box-shadow: 0 8px 22px rgba(124,92,255,.36);
  transition: transform var(--dur-fast) var(--ease-spring), box-shadow var(--dur-base), background-position var(--dur-slow);
}
.new-chat-btn:hover { background-position: 100% 0; box-shadow: 0 10px 28px rgba(124,92,255,.5); }
.new-chat-btn:active { transform: scale(.97); }
.new-chat-btn svg { width: 18px; height: 18px; }

.history-scroll { flex: 1; overflow-y: auto; margin: 0 calc(-1 * var(--s-1)); padding: 0 var(--s-1); }
.history-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--fg3); padding: var(--s-3) var(--s-2) var(--s-2);
}
.chat-item {
  position: relative;
  display: flex; align-items: center; gap: var(--s-2);
  padding: 10px var(--s-2) 10px 11px;
  border-radius: var(--r-sm); cursor: pointer; color: var(--fg2);
  font-size: 13.5px; font-weight: 500;
  transition: background var(--dur-fast), color var(--dur-fast);
}
.chat-item:hover { background: var(--bg-hover); color: var(--fg1); }
.chat-item.active { background: var(--bg-active); color: var(--fg1); }
.chat-item.active::before {
  content: ''; position: absolute; left: 0; top: 18%; bottom: 18%; width: 3px;
  border-radius: 999px; background: var(--brand-gradient);
}
.chat-item .ci-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--fg3); }
.chat-item.active .ci-icon { color: var(--grad-violet); }
.chat-item .ci-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-item .ci-del {
  width: 24px; height: 24px; border-radius: 7px; border: none; background: transparent;
  color: var(--fg3); cursor: pointer; display: grid; place-items: center;
  opacity: 0; flex-shrink: 0; transition: opacity var(--dur-fast), background var(--dur-fast), color var(--dur-fast);
}
.chat-item:hover .ci-del { opacity: 1; }
.chat-item .ci-del:hover { background: rgba(255,107,107,.16); color: var(--grad-coral); }
.chat-item .ci-del svg { width: 14px; height: 14px; }
.history-empty { color: var(--fg3); font-size: 13px; padding: var(--s-4) var(--s-2); text-align: center; }

.sidebar-footer {
  border-top: 1px solid var(--border);
  padding-top: var(--s-3); display: flex; flex-direction: column; gap: 2px;
}
.sb-row {
  display: flex; align-items: center; gap: var(--s-3);
  padding: 10px var(--s-2); border-radius: var(--r-sm);
  cursor: pointer; color: var(--fg2); font-size: 13.5px; font-weight: 500;
  border: none; background: transparent; width: 100%; font-family: var(--font-ui);
  transition: background var(--dur-fast), color var(--dur-fast);
}
.sb-row:hover { background: var(--bg-hover); color: var(--fg1); }
.sb-row svg { width: 18px; height: 18px; flex-shrink: 0; }
.sb-row .spacer { flex: 1; }
.theme-switch {
  width: 42px; height: 24px; border-radius: 999px; background: var(--bg-hover);
  border: 1px solid var(--border); position: relative; flex-shrink: 0;
  transition: background var(--dur-base);
}
.theme-switch .knob {
  position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
  border-radius: 50%; background: var(--brand-gradient);
  transition: transform var(--dur-base) var(--ease-spring);
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}
[data-theme="light"] .theme-switch .knob { transform: translateX(18px); }

/* ---------- MAIN ---------- */
.main {
  position: relative; display: flex; flex-direction: column;
  min-width: 0; height: 100dvh; overflow: hidden;
}
.topbar {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-3) var(--s-5);
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  z-index: 20; flex-shrink: 0;
}
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--fg2); cursor: pointer; display: grid; place-items: center;
  flex-shrink: 0; transition: background var(--dur-fast), color var(--dur-fast), transform var(--dur-fast), border-color var(--dur-fast);
}
.icon-btn:hover { background: var(--bg-hover); color: var(--fg1); border-color: var(--border-strong); }
.icon-btn:active { transform: scale(.94); }
.icon-btn svg { width: 19px; height: 19px; }
.menu-btn { display: none; }

.topbar-title { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar-title .sub { display: block; font-size: 11.5px; font-weight: 500; color: var(--fg3); }

/* model selector */
.model-select { position: relative; }
.model-trigger {
  display: flex; align-items: center; gap: var(--s-2);
  padding: 8px 12px 8px 10px; border-radius: var(--r-pill);
  border: 1px solid var(--border-strong); background: var(--bg-elevated);
  cursor: pointer; font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: var(--fg1);
  transition: background var(--dur-fast), border-color var(--dur-fast);
}
.model-trigger:hover { background: var(--bg-hover); border-color: var(--border-glow); }
.model-trigger .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(124,92,255,.18); }
.model-trigger .chev { width: 15px; height: 15px; color: var(--fg3); transition: transform var(--dur-base); }
.model-select.open .model-trigger .chev { transform: rotate(180deg); }
.model-trigger .auto-pill {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  padding: 2px 7px; border-radius: 999px; background: var(--brand-gradient-soft); color: var(--grad-violet);
}
[data-theme="light"] .model-trigger .auto-pill { color: #6D45E8; }

.model-menu {
  position: absolute; top: calc(100% + 8px); right: 0; width: 320px; z-index: 60;
  background: var(--bg-panel-solid); border: 1px solid var(--border-strong);
  border-radius: var(--r-md); box-shadow: var(--shadow-3); padding: var(--s-2);
  opacity: 0; transform: translateY(-8px) scale(.98); pointer-events: none;
  transition: opacity var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
}
.model-select.open .model-menu { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
.model-menu-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--fg3); padding: var(--s-2) var(--s-3) var(--s-1); }
.model-opt {
  display: flex; align-items: flex-start; gap: var(--s-3); padding: 11px var(--s-3);
  border-radius: var(--r-sm); cursor: pointer; transition: background var(--dur-fast);
}
.model-opt:hover { background: var(--bg-hover); }
.model-opt.selected { background: var(--bg-active); }
.model-opt .mo-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.model-opt .mo-body { flex: 1; min-width: 0; }
.model-opt .mo-name { font-size: 13.5px; font-weight: 700; color: var(--fg1); display: flex; align-items: center; gap: 6px; }
.model-opt .mo-name .badge { font-size: 9.5px; font-weight: 700; padding: 2px 6px; border-radius: 5px; background: var(--bg-hover); color: var(--fg2); text-transform: uppercase; letter-spacing: .03em; }
.model-opt .mo-desc { font-size: 12px; color: var(--fg3); margin-top: 2px; line-height: 1.4; }
.model-opt .mo-check { width: 17px; height: 17px; color: var(--grad-violet); flex-shrink: 0; margin-top: 3px; opacity: 0; }
.model-opt.selected .mo-check { opacity: 1; }
/* ===== SECTION:MESSAGES ===== */
.chat-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scroll-behavior: smooth;
}
.chat-inner {
  max-width: 820px; margin: 0 auto;
  padding: var(--s-8) var(--s-5) 140px;
  display: flex; flex-direction: column; gap: var(--s-6);
}

/* welcome / empty state */
.welcome { padding: 3vh 0 var(--s-8); text-align: center; animation: rise var(--dur-slow) var(--ease-out); }
.welcome-mark {
  width: 68px; height: 68px; border-radius: 20px; margin: 0 auto var(--s-4);
  background: var(--brand-gradient); display: grid; place-items: center;
  box-shadow: 0 16px 40px rgba(124,92,255,.5);
  animation: floaty 5s ease-in-out infinite;
}
.welcome-mark svg { width: 40px; height: 40px; }
.welcome h1 {
  font-size: clamp(26px, 4vw, 36px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: var(--s-3);
}
.welcome h1 .grad { background: var(--brand-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.welcome p { color: var(--fg2); font-size: 15.5px; max-width: 480px; margin: 0 auto var(--s-6); }
.suggest-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--s-3);
  max-width: 620px; margin: 0 auto;
}
.suggest-card {
  text-align: left; padding: var(--s-4); border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--bg-elevated);
  backdrop-filter: blur(12px); cursor: pointer; font-family: var(--font-ui);
  transition: transform var(--dur-base) var(--ease-out), border-color var(--dur-fast), background var(--dur-fast);
  display: flex; gap: var(--s-3); align-items: flex-start;
}
.suggest-card:hover { transform: translateY(-3px); border-color: var(--border-glow); background: var(--bg-hover); }
.suggest-card .sc-ico { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
.suggest-card .sc-ico svg { width: 18px; height: 18px; color: #fff; }
.suggest-card .sc-title { font-size: 13.5px; font-weight: 700; color: var(--fg1); }
.suggest-card .sc-desc { font-size: 12px; color: var(--fg3); margin-top: 2px; }

/* message row */
.msg { display: flex; gap: var(--s-4); animation: msgIn var(--dur-slow) var(--ease-out); }
@keyframes msgIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.msg .avatar {
  width: 36px; height: 36px; border-radius: 11px; flex-shrink: 0;
  display: grid; place-items: center; font-weight: 800; font-size: 14px;
}
.msg.user .avatar { background: linear-gradient(135deg, #2DD4BF, #5B8DEF); color: #04121A; }
.msg.ai .avatar { background: var(--brand-gradient); box-shadow: 0 6px 16px rgba(124,92,255,.4); }
.msg.ai .avatar svg { width: 20px; height: 20px; }
.msg-body { flex: 1; min-width: 0; }
.msg-name { font-size: 12.5px; font-weight: 700; color: var(--fg2); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.msg-name .route-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
  text-transform: uppercase; letter-spacing: .04em;
  background: var(--bg-hover); color: var(--fg3); display: inline-flex; align-items: center; gap: 5px;
}
.msg-name .route-badge .rb-dot { width: 6px; height: 6px; border-radius: 50%; }
.bubble {
  background: var(--bg-bubble-ai); border: 1px solid var(--border);
  border-radius: 6px var(--r-md) var(--r-md) var(--r-md);
  padding: var(--s-4) var(--s-5);
  backdrop-filter: blur(var(--glass-blur)) saturate(130%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(130%);
  box-shadow: var(--shadow-1);
}
.msg.user .bubble { background: var(--bg-bubble-user); border-color: var(--border-strong); }

/* markdown content */
.md { font-size: 15px; color: var(--fg1); overflow-wrap: anywhere; }
.md > *:first-child { margin-top: 0; }
.md > *:last-child { margin-bottom: 0; }
.md p { margin: 0 0 12px; }
.md h1, .md h2, .md h3, .md h4 { font-weight: 700; letter-spacing: -0.01em; margin: 20px 0 10px; line-height: 1.3; }
.md h1 { font-size: 22px; } .md h2 { font-size: 19px; } .md h3 { font-size: 16.5px; } .md h4 { font-size: 15px; }
.md ul, .md ol { margin: 0 0 12px; padding-left: 22px; }
.md li { margin: 4px 0; }
.md li::marker { color: var(--grad-violet); }
.md a { color: var(--grad-teal); text-decoration: none; border-bottom: 1px solid rgba(45,212,191,.4); }
.md a:hover { border-bottom-color: var(--grad-teal); }
.md strong { font-weight: 700; color: var(--fg1); }
.md blockquote { border-left: 3px solid var(--grad-violet); padding: 2px 0 2px 16px; margin: 0 0 12px; color: var(--fg2); }

.md :not(pre) > code {

}
[data-theme="light"] .md :not(pre) > code { color: #0E7C6B; }
.md img { max-width: 100%; border-radius: var(--r-sm); margin: 6px 0; }

/* code block */
.code-wrap { margin: 0 0 14px; border-radius: var(--r-sm); overflow: hidden; border: 1px solid var(--border-strong); background: var(--code-bg); }
.code-head {
  display: flex; align-items: center; justify-content: space-between;

}
.code-lang { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--fg3); text-transform: uppercase; letter-spacing: .04em; }
.copy-btn {

}

.copy-btn svg { width: 13px; height: 13px; }
.code-wrap pre { margin: 0; padding: 14px 16px; overflow-x: auto; }
.code-wrap pre code { font-family: var(--font-mono); font-size: 13px; line-height: 1.6; background: none !important; padding: 0; }

/* generated image */
.gen-image { margin: 4px 0 0; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border-strong); position: relative; max-width: 420px; box-shadow: var(--shadow-2); }
.gen-image img { display: block; width: 100%; }
.gen-image .gi-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(transparent, rgba(0,0,0,.65)); opacity: 0; transition: opacity var(--dur-base); }

.gi-download { display: flex; align-items: center; gap: 6px; color: #fff; font-size: 12px; font-weight: 600; text-decoration: none; background: rgba(0,0,0,.4); padding: 6px 11px; border-radius: 999px; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.2); }
.gi-download svg { width: 13px; height: 13px; }
.gi-label { color: rgba(255,255,255,.85); font-size: 11.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }

/* attachments inside message */
.msg-attachments { display: flex; flex-wrap: wrap; gap: var(--s-2); margin-bottom: var(--s-3); }
.att-thumb { border-radius: var(--r-sm); overflow: hidden; border: 1px solid var(--border-strong); }
.att-thumb img { display: block; max-width: 200px; max-height: 200px; object-fit: cover; }
.att-file {
  display: flex; align-items: center; gap: var(--s-2); padding: 9px 13px;

}
.att-file .af-ico { width: 30px; height: 30px; border-radius: 8px; background: var(--brand-gradient-soft); display: grid; place-items: center; flex-shrink: 0; color: var(--grad-violet); }
.att-file .af-ico svg { width: 16px; height: 16px; }
.att-file .af-meta { font-size: 11px; font-weight: 500; color: var(--fg3); }

/* typing indicator */
.typing { display: inline-flex; align-items: center; gap: 5px; padding: 4px 0; }
.typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--grad-violet); animation: blink 1.4s ease-in-out infinite; }
.typing span:nth-child(2) { background: var(--grad-teal); animation-delay: .2s; }
.typing span:nth-child(3) { background: var(--grad-coral); animation-delay: .4s; }
@keyframes blink { 0%, 60%, 100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
.cursor-blink { display: inline-block; width: 8px; height: 16px; background: var(--grad-violet); margin-left: 2px; vertical-align: text-bottom; animation: caret 1s step-end infinite; border-radius: 2px; }
@keyframes caret { 50% { opacity: 0; } }

@keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.composer-wrap {

.tray-chip {

.tray-chip .tc-x:hover { background: rgba(255,107,107,.16); color: var(--grad-coral); }

.composer-main { display: flex; align-items: flex-end; gap: var(--s-2); padding: var(--s-3) var(--s-3) var(--s-3) var(--s-3); }

}

.composer-btn:active { transform: scale(.9); }

.send-btn {

}

.send-btn.stop:hover { box-shadow: 0 8px 22px rgba(255,107,107,.6); }
.composer-hint { text-align: center; font-size: 11.5px; color: var(--fg3); margin-top: 10px; }
.composer-hint kbd { font-family: var(--font-mono); font-size: 10.5px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; }

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg-panel-solid); border: 1px solid var(--border-strong); color: var(--fg1);
  padding: 11px 18px; border-radius: var(--r-pill); font-size: 13.5px; font-weight: 600;

.toast svg { width: 16px; height: 16px; color: var(--grad-teal); }
.toast.error svg { color: var(--grad-coral); }

/* mobile backdrop */
.backdrop {
  position: fixed; inset: 0; z-index: 25; background: rgba(0,0,0,.5);
  opacity: 0; pointer-events: none; transition: opacity var(--dur-base);
  backdrop-filter: blur(2px);

/* ===== SECTION:RESPONSIVE ===== */

function enhanceContent(container) {
  container.querySelectorAll("pre > code").forEach((code) => {
    const pre = code.parentElement;
    if (pre.dataset.enhanced) return;
    pre.dataset.enhanced = "1";
    let lang = "code";
    const m = [...code.classList].find(c => c.startsWith("language-"));
    if (m) lang = m.replace("language-", "");
    try { hljs.highlightElement(code); } catch (e) {}
    const wrap = el("div", "code-wrap");
    const head = el("div", "code-head");
    head.appendChild(el("span", "code-lang", lang === "code" ? "text" : lang));
    const btn = el("button", "copy-btn", ICONS.copy + "<span>Copy</span>");
    btn.type = "button";
    btn.addEventListener("click", () => {
      navigator.clipboard.writeText(code.textContent).then(() => {
        btn.classList.add("copied");
        btn.innerHTML = ICONS.check + "<span>Copied</span>";
        setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = ICONS.copy + "<span>Copy</span>"; }, 1600);
      });
    });
    head.appendChild(btn);
    pre.replaceWith(wrap);
    wrap.appendChild(head);
    wrap.appendChild(pre);
  });
  container.querySelectorAll("a").forEach(a => { a.target = "_blank"; a.rel = "noopener"; });
}

/* ---- toast ---- */
let toastTimer;
function toast(msg, isError) {
  const t = $("#toast");
  t.className = "toast" + (isError ? " error" : "");
  t.innerHTML = (isError
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v5M12 16.5v.5"/><circle cx="12" cy="12" r="9"/></svg>'
    : ICONS.check) + "<span>" + esc(msg) + "</span>";
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

/* ============================================================
   RENDERING
   ============================================================ */
function activeChat() { return store.chats.find(c => c.id === store.activeId); }

function renderApp() {
  renderHistory();
  renderMessages();
  renderModelUI();
  updateTopbar();
}

function updateTopbar() {
  const c = activeChat();
  $("#topbarTitle").childNodes[0].nodeValue = c && c.messages.length ? c.title : "New chat";
  const m = MODELS[store.selectedModel];
  $("#topbarSub").textContent = store.selectedModel === "auto" ? "Smart routing active" : m.name + " selected";
}

/* ---- history list ---- */
function renderHistory() {
  const list = $("#historyList");
  list.innerHTML = "";
  if (!store.chats.length) {
    list.appendChild(el("div", "history-empty", "No chats yet.<br>Start a conversation."));
    return;
  }
  store.chats.forEach(c => {
    const item = el("div", "chat-item" + (c.id === store.activeId ? " active" : ""));
    item.innerHTML = '<span class="ci-icon">' + ICONS.chat + '</span><span class="ci-title">' + esc(c.title) + '</span>';
    const del = el("button", "ci-del", ICONS.x);
    del.title = "Delete chat";
    del.addEventListener("click", (e) => { e.stopPropagation(); deleteChat(c.id); });
    item.appendChild(del);
    item.addEventListener("click", () => { selectChat(c.id); closeSidebarMobile(); });
    list.appendChild(item);
  });
}

/* ---- messages ---- */
function renderMessages() {
  const inner = $("#chatInner");
  inner.innerHTML = "";
  const c = activeChat();
  if (!c || !c.messages.length) { renderWelcome(inner); return; }
  c.messages.forEach(m => inner.appendChild(buildMessage(m)));
  scrollToBottom(false);
}

function renderWelcome(inner) {
  const w = el("div", "welcome");
  w.innerHTML =
    '<div class="welcome-mark">' + ICONS.spark + '</div>' +
    '<h1>How can I help, <span class="grad">today</span>?</h1>' +
    '<p>Chat, analyse documents and images, write code, or generate visuals — Silvia routes every message to the right Gemini model automatically.</p>';
  const grid = el("div", "suggest-grid");
  const suggestions = [
    { ico: ICONS.image, grad: "linear-gradient(135deg,#FBBF24,#FF6B6B)", title: "Generate an image", desc: "“A neon koi pond at dusk, cinematic”", text: "Generate an image of a neon koi pond at dusk, cinematic lighting" },
    { ico: ICONS.doc, grad: "linear-gradient(135deg,#5B8DEF,#7C5CFF)", title: "Analyse a document", desc: "Attach a PDF and ask for a summary", text: "Summarise the key points of the attached document." },
    { ico: ICONS.code, grad: "linear-gradient(135deg,#2DD4BF,#5B8DEF)", title: "Write some code", desc: "“A debounce hook in TypeScript”", text: "Write a reusable debounce hook in TypeScript with an example." },
    { ico: ICONS.pen, grad: "linear-gradient(135deg,#F472B6,#7C5CFF)", title: "Draft & rewrite", desc: "Emails, posts, anything", text: "Draft a warm, concise launch announcement for a new AI product." }
  ];
  suggestions.forEach(s => {
    const card = el("button", "suggest-card");
    card.type = "button";
    card.innerHTML = '<span class="sc-ico" style="background:' + s.grad + '">' + s.ico + '</span>' +
      '<span><span class="sc-title">' + s.title + '</span><span class="sc-desc">' + esc(s.desc) + '</span></span>';
    card.addEventListener("click", () => { $("#input").value = s.text; autoGrow(); $("#input").focus(); updateSendState(); });
    grid.appendChild(card);
  });
  w.appendChild(grid);
  inner.appendChild(w);
}

function buildMessage(m) {
  const row = el("div", "msg " + m.role);
  const avatar = el("div", "avatar");
  avatar.innerHTML = m.role === "ai" ? ICONS.spark : "You".slice(0, 1);
  if (m.role === "user") avatar.textContent = "Y";
  row.appendChild(avatar);

  const body = el("div", "msg-body");
  const name = el("div", "msg-name");
  name.innerHTML = m.role === "ai" ? "Silvia" : "You";
  if (m.role === "ai" && m.modelId) {
    const md = MODELS[m.modelId] || MODELS.flash;
    const badge = el("span", "route-badge",
      '<span class="rb-dot" style="background:' + md.color + '"></span>' + md.name);
    name.appendChild(badge);
  }
  body.appendChild(name);

  // attachments (user)
  if (m.attachments && m.attachments.length) {
    const tray = el("div", "msg-attachments");
    m.attachments.forEach(a => {
      if (a.isImage) {
        const t = el("div", "att-thumb");
        t.innerHTML = '<img src="' + a.dataUrl + '" alt="' + esc(a.name) + '">';
        tray.appendChild(t);
      } else {
        const f = el("div", "att-file");
        f.innerHTML = '<span class="af-ico">' + ICONS.file + '</span><span><span>' + esc(a.name) + '</span><span class="af-meta"> ' + fmtSize(a.size) + '</span></span>';
        tray.appendChild(f);
      }
    });
    body.appendChild(tray);
  }

  const bubble = el("div", "bubble");
  if (m.role === "ai" && m.pending) {
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  } else if (m.image) {
    const gi = el("div", "gen-image");
    gi.innerHTML = '<img src="' + m.image + '" alt="generated image">' +
      '<div class="gi-bar"><span class="gi-label">' + ICONS.spark + ' Nano Banana 2</span>' +
      '<a class="gi-download" href="' + m.image + '" download="silvia-image.png">' + ICONS.download + 'Save</a></div>';
    bubble.appendChild(gi);
    if (m.content) { const cap = el("div", "md"); cap.innerHTML = renderMarkdown(m.content); bubble.appendChild(cap); enhanceContent(cap); }
  } else {
    const md = el("div", "md");
    md.innerHTML = renderMarkdown(m.content || "");
    bubble.appendChild(md);
    enhanceContent(md);
  }
  body.appendChild(bubble);
  row.appendChild(body);
  return row;
}

function fmtSize(b) {
  if (!b) return "";
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}

function scrollToBottom(smooth = true) {
  const s = $("#chatScroll");
  requestAnimationFrame(() => s.scrollTo({ top: s.scrollHeight, behavior: smooth ? "smooth" : "auto" }));
}

/* ============================================================
   MODEL SELECTOR UI
   ============================================================ */
function renderModelUI() {
  const opts = $("#modelOptions");
  opts.innerHTML = "";
  Object.values(MODELS).forEach(m => {
    const o = el("div", "model-opt" + (m.id === store.selectedModel ? " selected" : ""));

      $("#modelSelect").classList.remove("open");

    });

/* ============================================================
   CHAT MANAGEMENT
   ============================================================ */
function newChat() {
  const c = { id: uid(), title: "New chat", messages: [], createdAt: Date.now() };
  store.chats.unshift(c);
  store.activeId = c.id;
  store.attachments = [];
  renderAttachTray();
  saveChats(); renderApp();
  $("#input").value = ""; autoGrow(); updateSendState(); $("#input").focus();
}
function selectChat(id) { store.activeId = id; renderApp(); }
function deleteChat(id) {
  store.chats = store.chats.filter(c => c.id !== id);
  if (store.activeId === id) store.activeId = store.chats[0] ? store.chats[0].id : null;
  if (!store.chats.length) newChat(); else { saveChats(); renderApp(); }
}
function clearAllChats() {
  if (!store.chats.length) return;
  store.chats = []; store.activeId = null;
  saveChats(); newChat(); toast("All chats cleared");
}

/* ============================================================
   FILE / ATTACHMENT HANDLING
   ============================================================ */
const TEXT_EXT = /\.(txt|md|csv|json|js|jsx|ts|tsx|py|java|c|cpp|cs|go|rb|rs|php|html|css|scss|xml|yml|yaml|sh|sql|swift|kt|toml|ini|log)$/i;

function handleFiles(fileList) {
  [...fileList].forEach(file => {
    const reader = new FileReader();
    const isImage = file.type.startsWith("image/");
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.includes(",") ? result.split(",")[1] : result;
      store.attachments.push({
        id: uid(), name: file.name, size: file.size,
        mime: file.type || guessMime(file.name),
        isImage, dataUrl: isImage ? result : null, base64
      });
      renderAttachTray(); updateSendState();
    };
    reader.readAsDataURL(file);
  });
}
function guessMime(name) {
  if (/\.pdf$/i.test(name)) return "application/pdf";
  if (TEXT_EXT.test(name)) return "text/plain";
  return "application/octet-stream";
}
function renderAttachTray() {
  const tray = $("#attachTray");
  tray.innerHTML = "";
  tray.classList.toggle("show", store.attachments.length > 0);
  store.attachments.forEach(a => {
    const chip = el("div", "tray-chip");
    chip.innerHTML = a.isImage
      ? '<img class="tc-thumb" src="' + a.dataUrl + '">'
      : '<span class="tc-ico">' + ICONS.file + '</span>';
    chip.innerHTML += '<span class="tc-name">' + esc(a.name) + '</span>';
    const x = el("button", "tc-x", ICONS.x); x.type = "button";
    x.addEventListener("click", () => {
      store.attachments = store.attachments.filter(o => o.id !== a.id);
      renderAttachTray(); updateSendState();
    });
    chip.appendChild(x);
    tray.appendChild(chip);
  });
}

/* ============================================================
   ROUTING  —  decide which model handles a message
   ============================================================ */
const IMAGE_INTENT = /\b(generate|create|make|draw|paint|render|design|produce|imagine)\b[^.?!]*\b(image|picture|photo|art|artwork|illustration|logo|icon|wallpaper|poster|drawing|painting|render|graphic|scene|portrait|sketch)\b|^\/(image|img|imagine)\b|\bnano banana\b/i;

function routeModel(text, hasFiles) {
  if (store.selectedModel !== "auto") return store.selectedModel;
  if (IMAGE_INTENT.test(text)) return "image";
  if (hasFiles) return "pro";
  return "flash";
}

/* ============================================================
   GEMINI API
   ============================================================ */
function buildParts(text, attachments) {
  const parts = [];
  if (text) parts.push({ text });
  (attachments || []).forEach(a => {
    parts.push({ inline_data: { mime_type: a.mime, data: a.base64 } });
  });
  return parts;
}

function buildContents(chat, userText, attachments) {
  const contents = [];
  const history = chat.messages.filter(m => !m.pending && !m.image && m.content);
  history.forEach(m => {
    if (m.role === "user") {
      contents.push({ role: "user", parts: buildParts(m.content, m.attachments) });
    } else if (m.role === "ai") {
      contents.push({ role: "model", parts: [{ text: m.content }] });
    }
  });
  contents.push({ role: "user", parts: buildParts(userText, attachments) });
  return contents;
}

/* streaming text generation (Flash / Pro) */
async function streamGenerate(apiModel, contents, onChunk, signal) {
  const url = `${API_BASE}/${apiModel}:streamGenerateContent?alt=sse&key=${GEMINI_API_KEY}`;
  const res = await fetch(url, {
    method: "POST", signal,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents,
      generationConfig: { temperature: 0.85, maxOutputTokens: 8192 }
    })
  });
  if (!res.ok) throw await apiError(res);
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "", full = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop();
    for (const line of lines) {
      const t = line.trim();
      if (!t.startsWith("data:")) continue;
      const json = t.slice(5).trim();
      if (!json || json === "[DONE]") continue;
      try {
        const data = JSON.parse(json);
        const parts = data?.candidates?.[0]?.content?.parts || [];
        const chunk = parts.map(p => p.text || "").join("");
        if (chunk) { full += chunk; onChunk(full); }
      } catch (e) { /* partial json, ignore */ }
    }
  }
  return full;
}

/* image generation (Nano Banana 2) */
async function generateImage(apiModel, prompt, attachments, signal) {
  const url = `${API_BASE}/${apiModel}:generateContent?key=${GEMINI_API_KEY}`;
  const res = await fetch(url, {
    method: "POST", signal,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ role: "user", parts: buildParts(prompt, attachments) }],
      generationConfig: { responseModalities: ["IMAGE", "TEXT"] }
    })
  });
  if (!res.ok) throw await apiError(res);
  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts || [];
  let image = null, caption = "";
  parts.forEach(p => {
    const inl = p.inlineData || p.inline_data;
    if (inl && inl.data) image = `data:${inl.mimeType || inl.mime_type || "image/png"};base64,${inl.data}`;
    if (p.text) caption += p.text;
  });
  if (!image) throw new Error("The model returned no image. Try rephrasing your prompt.");
  return { image, caption };
}

async function apiError(res) {
  let detail = "";
  try { const j = await res.json(); detail = j?.error?.message || ""; } catch (e) {}
  if (res.status === 400 && /API key not valid/i.test(detail)) return new Error("Invalid API key. Add a valid Gemini key at the top of the file.");
  if (res.status === 403) return new Error("Access denied (403). Check your API key and that the model is enabled.");
  if (res.status === 429) return new Error("Rate limit reached. Please wait a moment and try again.");
  return new Error(detail || `Request failed (${res.status}).`);
}

/* ============================================================
   SEND FLOW
   ============================================================ */
let abortCtrl = null;

async function sendMessage() {
  if (store.streaming) return;
  const input = $("#input");
  const text = input.value.trim();
  const attachments = store.attachments.slice();
  if (!text && !attachments.length) return;
  if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
    toast("Add your Gemini API key at the top of the file", true);
  }

  let chat = activeChat();
  if (!chat) { newChat(); chat = activeChat(); }

  // user message
  const userMsg = { id: uid(), role: "user", content: text, attachments };
  chat.messages.push(userMsg);
  if (chat.messages.filter(m => m.role === "user").length === 1) {
    chat.title = (text || attachments[0]?.name || "New chat").slice(0, 48);
  }

  // reset composer
  input.value = ""; store.attachments = []; renderAttachTray(); autoGrow(); updateSendState();

  const modelId = routeModel(text, attachments.length > 0);
  const apiModel = MODELS[modelId].api;

  // pending AI message
  const aiMsg = { id: uid(), role: "ai", content: "", modelId, pending: true };
  chat.messages.push(aiMsg);
  renderMessages(); renderHistory(); updateTopbar();
  scrollToBottom();

  store.streaming = true; setSending(true);
  abortCtrl = new AbortController();

  try {
    if (modelId === "image") {
      const { image, caption } = await generateImage(apiModel, text, attachments, abortCtrl.signal);
      aiMsg.pending = false; aiMsg.image = image; aiMsg.content = caption || "";
    } else {
      const contents = buildContents(chat, text, attachments);
      const aiRow = () => $("#chatInner").lastElementChild?.querySelector(".bubble");
      await streamGenerate(apiModel, contents, (full) => {
        aiMsg.content = full; aiMsg.pending = false;
        const bubble = aiRow();
        if (bubble) {
          const md = bubble.querySelector(".md") || (() => { bubble.innerHTML = '<div class="md"></div>'; return bubble.querySelector(".md"); })();
          md.innerHTML = renderMarkdown(full) + '<span class="cursor-blink"></span>';
          autoScrollIfNear();
        }
      }, abortCtrl.signal);
      if (!aiMsg.content) { aiMsg.content = "_(No response generated.)_"; }
    }
    aiMsg.pending = false;
  } catch (err) {
    aiMsg.pending = false;
    if (err.name === "AbortError") { aiMsg.content = (aiMsg.content || "") + "\n\n_⏹ Stopped._"; }
    else { aiMsg.content = "⚠️ **" + esc(err.message || "Something went wrong.") + "**"; aiMsg.error = true; }
  } finally {
    store.streaming = false; setSending(false); abortCtrl = null;
    renderMessages(); saveChats();
  }
}

function autoScrollIfNear() {
  const s = $("#chatScroll");
  if (s.scrollHeight - s.scrollTop - s.clientHeight < 160) s.scrollTop = s.scrollHeight;
}

function setSending(on) {
  const btn = $("#sendBtn");
  if (on) {
    btn.disabled = false;
    btn.classList.add("stop");
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
    btn.setAttribute("aria-label", "Stop");
  } else {
    btn.classList.remove("stop");
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
    btn.setAttribute("aria-label", "Send");
    updateSendState();
  }
}

/* ============================================================
   COMPOSER UI
   ============================================================ */
function autoGrow() {
  const t = $("#input");
  t.style.height = "auto";
  t.style.height = Math.min(t.scrollHeight, 200) + "px";
}
function updateSendState() {
  if (store.streaming) return;
  const has = $("#input").value.trim().length > 0 || store.attachments.length > 0;
  $("#sendBtn").disabled = !has;
}

/* ============================================================
   THEME + SIDEBAR
   ============================================================ */
function setTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem(LS_THEME, t);
  const dark = document.querySelector('link[href*="github-dark"]');
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
}
const isMobile = () => window.matchMedia("(max-width: 860px)").matches;
function toggleSidebar() {
  const app = $("#app");
  if (isMobile()) app.classList.toggle("sidebar-open");
  else app.classList.toggle("sidebar-collapsed");
}
function closeSidebarMobile() { if (isMobile()) $("#app").classList.remove("sidebar-open"); }

/* ============================================================
   EVENTS + INIT
   ============================================================ */
function bind() {
  $("#newChatBtn").addEventListener("click", () => { newChat(); closeSidebarMobile(); });
  $("#menuBtn").addEventListener("click", toggleSidebar);
  $("#collapseBtn").addEventListener("click", toggleSidebar);
  $("#backdrop").addEventListener("click", closeSidebarMobile);
  $("#themeRow").addEventListener("click", toggleTheme);
  $("#clearAllRow").addEventListener("click", clearAllChats);

  // model dropdown
  const ms = $("#modelSelect");
  $("#modelTrigger").addEventListener("click", (e) => { e.stopPropagation(); ms.classList.toggle("open"); });
  document.addEventListener("click", (e) => { if (!ms.contains(e.target)) ms.classList.remove("open"); });

  // composer
  const input = $("#input");
  input.addEventListener("input", () => { autoGrow(); updateSendState(); });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); store.streaming ? null : sendMessage(); }
  });
  $("#composer").addEventListener("submit", (e) => {
    e.preventDefault();
    if (store.streaming) { abortCtrl?.abort(); return; }
    sendMessage();
  });
  $("#composer").addEventListener("focusin", () => $("#composer").classList.add("focused"));
  $("#composer").addEventListener("focusout", () => $("#composer").classList.remove("focused"));

  // attachments
  $("#attachBtn").addEventListener("click", () => $("#fileInput").click());
  $("#fileInput").addEventListener("change", (e) => { handleFiles(e.target.files); e.target.value = ""; });

  // drag + drop
  const composer = $("#composer");
  ["dragenter", "dragover"].forEach(ev => composer.addEventListener(ev, (e) => { e.preventDefault(); composer.classList.add("dragover"); }));
  ["dragleave", "drop"].forEach(ev => composer.addEventListener(ev, (e) => {
    e.preventDefault();
    if (ev === "drop" && e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    if (ev === "dragleave" && composer.contains(e.relatedTarget)) return;
    composer.classList.remove("dragover");
  }));
  // global drop (anywhere on chat) routes to attach
  const main = document.querySelector(".main");
  ["dragover"].forEach(ev => main.addEventListener(ev, (e) => { e.preventDefault(); }));
  main.addEventListener("drop", (e) => { e.preventDefault(); if (e.dataTransfer.files.length) { handleFiles(e.dataTransfer.files); composer.classList.remove("dragover"); } });

  // paste images
  input.addEventListener("paste", (e) => {
    const files = [...(e.clipboardData?.items || [])].filter(i => i.kind === "file").map(i => i.getAsFile()).filter(Boolean);
    if (files.length) { e.preventDefault(); handleFiles(files); }
  });

  window.addEventListener("resize", () => { if (!isMobile()) $("#app").classList.remove("sidebar-open"); });
}

function init() {
  setTheme(localStorage.getItem(LS_THEME) || "dark");
  const sm = localStorage.getItem(LS_MODEL);
  if (sm && MODELS[sm]) store.selectedModel = sm;
  loadChats();
  if (store.chats.length) store.activeId = store.chats[0].id; else newChat();
  bind();
  renderApp();
  autoGrow();
  updateSendState();
}
document.addEventListener("DOMContentLoaded", init);



</script>
